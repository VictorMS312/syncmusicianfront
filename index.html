<!DOCTYPE html>
<html lang="pt-br">  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Musician v7.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f1f1f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* CSS ESSENCIAL PARA O FUNCIONAMENTO */
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }
        
        /* Grid de Pastas */
        .grid-pastas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 15px;
        }
        .card-pasta {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            cursor: pointer;
        }
        .folder-icon { font-size: 40px; display: block; margin-bottom: 10px; }

        /* Botão Flutuante + */
        .btn-floating {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #2563eb;
            color: white;
            border-radius: 50%;
            border: none;
            font-size: 30px;
            display: none; /* JS mostra quando necessário */
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        /* Modal Biblioteca */
        #modal-biblioteca {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        /* Estilos legados do seu v6.0 */
        .header { background: #1f1f1f; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .btn-main { background: #2563eb; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; }
        #cifra-container { font-family: monospace; white-space: pre; padding: 20px; font-size: 16px; line-height: 1.5; }
        .chord { color: #ff9800; font-weight: bold; }
        .song-item { padding: 15px; border-bottom: 1px solid #222; background: #111; margin-bottom: 5px; border-radius: 8px; }
        #cifra-wrapper { height: calc(100vh - 120px); overflow-y: auto; }
    </style>
</head>
<body>

<div id="setup-screen" style="padding: 30px; text-align: center;">
    <h1>Sync Musician v7.0</h1>
    <p id="last-session-info" style="color: #888;"></p>
    <button onclick="initRole('S')" class="btn-main" style="width: 240px; margin-bottom: 20px;">SOU O LÍDER (Sênior)</button>
    <div style="color: #555; margin: 20px;">OU</div>
    <input type="text" id="join-id" placeholder="ID do Líder" style="padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white;">
    <button onclick="initRole('M')" class="btn-main" style="background: #059669; width: 240px; margin-top: 10px;">CONECTAR COMO MÚSICO</button>
</div>

<div id="main-app" class="hidden">
    <div class="header">
        <div id="status">Conectando...</div>
        <div id="senior-header-controls" class="hidden">
            <button onclick="copyID()">ID</button>
            <button onclick="toggleQR()">QR</button>
        </div>
    </div>

    <div id="senior-controls" class="hidden" style="padding: 10px; background: #111; display: flex; gap: 5px;">
        <input type="text" id="url-input" placeholder="Link Cifra Club" style="flex: 1; padding: 8px;">
        <button onclick="addSong()">SALVAR</button>
    </div>

    <div id="info-tom" style="display:none; padding: 10px; background: #111; border-bottom: 1px solid #222;">
        TOM: <span id="curr-val" style="color: #ff9800;">-</span>
    </div>

    <div id="cifra-wrapper">
        <div id="cifra-container">Selecione uma pasta ou música...</div>
    </div>
</div>

<button class="btn-floating" onclick="abrirModalBiblioteca()">+</button>
<button id="btn-home" onclick="goHome()" style="position: fixed; bottom: 20px; left: 20px; background: #444; color: white; border-radius: 50%; width: 50px; height: 50px; border: none; display: none;">🏠</button>

<div id="modal-biblioteca">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Adicionar Música</h3>
        <button onclick="fecharModalBiblioteca()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
    </div>
    <button onclick="importarPeloLink()" style="padding:15px; background:#059669; color:white; border:none; border-radius:8px; margin: 10px 0;">+ IMPORTAR NOVO LINK</button>
    <div id="bib-list" style="overflow-y: auto; flex: 1;"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sync_musician_v7')) || {
        pastas: { "Repertório Geral": [] },
        biblioteca: []
    };
    let pastaAtiva = "";
    let peer, connections = [], role = '';
    let currentTransposedText = "", currentTone = "C";

    function initRole(r) {
        role = r;
        peer = new Peer(); 
        
        // MOSTRAR APP E ESCONDER SETUP
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('btn-home').style.display = 'block';

        if (role === 'S') {
            setupLeader();
            renderPastas(); // Começa pelas pastas no modo líder
        } else {
            const id = document.getElementById('join-id').value.trim();
            if (!id) { alert("Insira o ID"); return goHome(); }
            setupMusician(id);
        }
    }

    function ajustarVisibilidade(tela) {
        // IDs que PRECISAM existir no HTML acima:
        const seniorCtrl = document.getElementById('senior-controls');
        const seniorHeader = document.getElementById('senior-header-controls');
        const infoTom = document.getElementById('info-tom');
        const btnPlus = document.querySelector('.btn-floating');

        seniorCtrl.classList.add('hidden');
        seniorHeader.classList.add('hidden');
        infoTom.style.display = 'none';
        btnPlus.style.display = 'none';

        if (tela === 'PASTAS') {
            // Fica tudo escondido mesmo
        } 
        else if (tela === 'DENTRO_DA_PASTA') {
            btnPlus.style.display = 'flex';
        } 
        else if (tela === 'CIFRA_ABERTA') {
            seniorCtrl.classList.remove('hidden');
            seniorHeader.classList.remove('hidden');
            infoTom.style.display = 'block';
        }
    }

    function renderPastas() {
        ajustarVisibilidade('PASTAS');
        const container = document.getElementById('cifra-container');
        container.innerHTML = `
            <div style="padding:10px">
                <h2>Minhas Pastas</h2>
                <div id="grid-pastas" class="grid-pastas"></div>
                <button onclick="criarPasta()" style="width:100%; padding:15px; background:#222; color:#aaa; border-radius:10px; border: 1px dashed #444;">+ Nova Pasta</button>
            </div>
        `;

        const grid = document.getElementById('grid-pastas');
        Object.keys(db.pastas).forEach(nome => {
            const card = document.createElement('div');
            card.className = 'card-pasta';
            card.innerHTML = `<span class="folder-icon">📁</span><strong>${nome}</strong>`;
            card.onclick = () => abrirPasta(nome);
            grid.appendChild(card);
        });
    }

    function abrirPasta(nome) {
        pastaAtiva = nome;
        ajustarVisibilidade('DENTRO_DA_PASTA');
        const container = document.getElementById('cifra-container');
        container.innerHTML = `
            <div style="padding:15px">
                <button onclick="renderPastas()" style="color:#2563eb; background:none; border:none; margin-bottom:10px">← Voltar</button>
                <h3>${nome}</h3>
                <div id="lista-musicas"></div>
            </div>
        `;

        const listDiv = document.getElementById('lista-musicas');
        db.pastas[nome].forEach((musica, index) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `<strong>${musica.title}</strong>`;
            item.onclick = () => abrirMusicaFinal(nome, index);
            listDiv.appendChild(item);
        });
    }

    function abrirMusicaFinal(nomePasta, index) {
        const musica = db.pastas[nomePasta][index];
        ajustarVisibilidade('CIFRA_ABERTA');
        currentTransposedText = musica.content;
        renderCifraComCores(musica.content);
        
        // Sincroniza se houver músicos conectados
        connections.forEach(c => {
            if (c.open) c.send({ type: 'SYNC', body: musica.content, tone: 'C' });
        });
    }

    function renderCifraComCores(text) {
        const html = text.replace(/[A-G][#b]?[mmax0-9s]*(?=\s|$|\/|\()/g, '<span class="chord">$&</span>');
        document.getElementById('cifra-container').innerHTML = html;
    }

    // --- FUNÇÕES DE LÓGICA ---
    function criarPasta() {
        const nome = prompt("Nome da pasta:");
        if (nome && !db.pastas[nome]) {
            db.pastas[nome] = [];
            salvarDB();
            renderPastas();
        }
    }

    function abrirModalBiblioteca() { document.getElementById('modal-biblioteca').style.display = 'flex'; }
    function fecharModalBiblioteca() { document.getElementById('modal-biblioteca').style.display = 'none'; }

    async function importarPeloLink() {
        const url = prompt("Link do Cifra Club:");
        if (!url) return;
        try {
            const res = await fetch(`https://syncmusician.onrender.com/get-cifra?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const nova = { title: data.titulo, content: data.cifra };
            db.pastas[pastaAtiva].push(nova);
            salvarDB();
            abrirPasta(pastaAtiva);
            fecharModalBiblioteca();
        } catch (e) { alert("Erro ao importar"); }
    }

    function salvarDB() { localStorage.setItem('sync_musician_v7', JSON.stringify(db)); }
    function goHome() { location.reload(); }

    function setupLeader() {
        peer.on('open', id => {
            document.getElementById('status').innerText = "LÍDER: " + id;
        });
        peer.on('connection', c => connections.push(c));
    }

    function setupMusician(id) {
        peer.on('open', () => {
            const c = peer.connect(id);
            c.on('open', () => document.getElementById('status').innerText = "CONECTADO");
            c.on('data', data => {
                if (data.type === 'SYNC') renderCifraComCores(data.body);
            });
        });
    }
</script>
</body>
</html>
